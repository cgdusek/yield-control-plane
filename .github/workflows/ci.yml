name: Local Gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1
  AWS_REGION: us-east-1

jobs:
  validate:
    name: Static, Rust, and Frontend Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OS tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
          python3 -m pip install --user pyyaml

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable

      - name: Run validation gate
        run: make validate

  integration:
    name: Postgres, LocalStack, and Smoke Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OS tools
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli jq curl

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable

      - name: Compose config
        run: docker compose config --quiet

      - name: Start Postgres and LocalStack
        run: |
          docker compose up -d postgres localstack
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:4566/_localstack/health >/dev/null; then
              break
            fi
            sleep 2
          done
          ./scripts/localstack-init.sh

      - name: Run DB-backed persistence tests
        run: RUN_DATABASE_TESTS=1 DATABASE_URL=postgres://yield:yield@127.0.0.1:15432/yield_control cargo test -p institutional-yield-persistence --all-features

      - name: Start full Compose runtime
        run: make dev-up

      - name: Run smoke gates
        run: |
          make smoke
          make smoke-failure-paths

      - name: Dump Compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop Compose runtime
        if: always()
        run: docker compose down -v

