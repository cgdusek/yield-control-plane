    element_type: software_system
    name: External Transfer Agent or Custodian
    description: External system boundary represented locally by the deterministic mock transfer-agent service.
    responsibilities:
      - Return deterministic subscription confirmation in local and sandbox simulation.
      - Represent the external transfer-agent or custodian integration boundary without asserting production authorization.
    technology: Mock Axum service in this repository; external production technology is outside scope.
    deployment_contexts:
