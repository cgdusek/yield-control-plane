      - README.md
      - scripts/smoke-create-sweep.sh
      - scripts/smoke-failure-paths.sh
  - id: PER-002
    c4_level: 1
    element_type: person
    name: Platform Engineer
    description: Repository operator who runs validation, local runtime, CI, AWS sandbox scripts, and evidence collection.
    responsibilities:
      - Maintain source-controlled evidence and validation gates.
      - Run opt-in sandbox commands with guardrails.
    technology: Git, make, shell scripts, GitHub Actions, OpenTofu when explicitly opted in.
    deployment_contexts:
      - ci
      - aws_sandbox
      - evidence
