elements:
  - id: PER-001
    c4_level: 1
    element_type: person
    name: Institutional Operator
    description: Human operator who uses the console or API scripts to configure policies, create orders, request redemptions, and inspect breaks.
    responsibilities:
      - Initiate local and sandbox workflow requests.
      - Review order, position, reconciliation, and health output.
    technology: Human user through browser, curl, or smoke scripts.
    deployment_contexts:
      - local_compose
      - aws_sandbox
    related_dfd_flows:
      - DF-001
      - DF-002
      - DF-016
      - DF-018
    related_controls:
      - CTL-SEC-001
      - CTL-PI-001
