schema_version: "1.0.0"
catalog: yield-control-plane-dfd
source_of_truth: docs/security/dfd/data-flow-catalog.yaml
flows:
  - id: DF-001
    name: Operator creates sweep policy
    description: An institutional operator or React console submits a sweep policy for an account through the API.
    source: EXT-001 Institutional Operator
    destination: P-001 API Service
    trust_boundaries_crossed:
      - TB-001
      - TB-002
    protocol_or_mechanism: HTTPS or localhost HTTP JSON POST /sweep-policies
    data_elements:
      - account_id
      - minimum_cash_balance
      - target_product
      - idempotency_key
      - correlation_id
    data_classification: restricted_financial_record
    purpose: Configure the local account sweep policy used by smoke and operator workflows.
    trigger: Operator submits CreateSweepPolicyRequest.
    persistence: Stored in sweep_policies and idempotency_records.
    retention: Retained while the policy remains active and while idempotency evidence is needed.
    authentication: operator_identity in future deployment; local demo uses required write headers only.
    authorization: policy_authorization in future deployment; local demo route does not implement production authorization.
    encryption_in_transit: TLS expected outside localhost; localhost HTTP is accepted only for local simulation.
    encryption_at_rest: Postgres storage; AWS sandbox RDS storage is KMS encrypted.
    integrity_controls:
      - CTL-PI-001 hashes idempotency key and request body.
      - CTL-AUDIT-001 records correlation metadata.
    replay_or_deduplication_controls:
      - idempotency_records primary key on scope and key_hash.
    logging_and_audit_evidence:
      - correlation_id
      - idempotency scope
      - API response resource_id
    monitoring_or_alerting:
      - API readiness and smoke command results.
    failure_mode: Invalid decimal or persistence error returns typed API error.
    recovery_or_compensation: Resubmit with same idempotency key for same body or resolve conflict before retry.
    related_controls:
      - CTL-SEC-001
      - CTL-PI-001
      - CTL-AUDIT-001
      - CTL-PRIV-001
    related_diagrams:
      - dfd-00-system-boundary.md
    source_files:
      - spec/openapi.yaml
      - services/api/src/routes/mod.rs
      - crates/persistence/src/repositories.rs
      - crates/persistence/migrations/20260616150400_initial.sql
      - scripts/smoke-create-sweep.sh
  - id: DF-002
    name: Operator creates sweep order with idempotency key
    description: An operator submits a sweep order that creates a Created order and emits the initial domain event.
    source: EXT-001 Institutional Operator
    destination: P-001 API Service
    trust_boundaries_crossed:
      - TB-001
      - TB-002
    protocol_or_mechanism: HTTPS or localhost HTTP JSON POST /sweep-orders
    data_elements:
      - account_id
      - amount
      - cash_asset
      - product_asset
      - idempotency_key
      - correlation_id
    data_classification: restricted_financial_record
    purpose: Start the sweep lifecycle while enforcing idempotent request handling.
    trigger: Operator submits CreateSweepOrderRequest.
    persistence: Stored through downstream DB writes DF-003, DF-004, and DF-005.
    retention: Retained through order, audit, and ledger evidence lifecycle.
    authentication: operator_identity in future deployment; local demo uses required write headers only.
    authorization: policy_authorization in future deployment; local demo validates assets and state rules.
    encryption_in_transit: TLS expected outside localhost; localhost HTTP is accepted only for local simulation.
    encryption_at_rest: Not persisted at this hop; persistence occurs in Postgres flows.
    integrity_controls:
      - FIDD is accepted only as a cash rail, not as a yield-bearing product.
      - CTL-PI-001 controls idempotent replay.
    replay_or_deduplication_controls:
      - Idempotency-Key header is required on write route.
    logging_and_audit_evidence:
      - correlation_id
      - order_id after creation
      - typed API error on conflict
    monitoring_or_alerting:
      - smoke-created order status polling.
    failure_mode: Conflicting idempotency body returns 409; invalid product or FIDD yield source returns error.
    recovery_or_compensation: Use same key and body for replay or create a new key for a new order.
    related_controls:
      - CTL-SEC-001
      - CTL-PI-001
      - CTL-AUDIT-001
      - CTL-PRIV-001
    related_diagrams:
      - dfd-00-system-boundary.md
      - dfd-03-sweep-order-flow.md
    source_files:
      - spec/openapi.yaml
      - services/api/src/routes/mod.rs
      - services/api/src/middleware/mod.rs
      - crates/persistence/src/repositories.rs
      - crates/domain/src/asset.rs
      - scripts/smoke-create-sweep.sh
  - id: DF-003
    name: API writes idempotency record
    description: The API persistence path writes or reuses an idempotency record keyed by scope and key hash.
    source: P-001 API Service
    destination: DS-001 Postgres Financial Store
    trust_boundaries_crossed:
      - TB-003
      - TB-005
    protocol_or_mechanism: SQLx transaction
    data_elements:
      - scope
      - key_hash
      - request_hash
      - response_json
      - resource_id
    data_classification: restricted_financial_record
    purpose: Prevent duplicate or conflicting writes.
    trigger: Create policy, create order, approve, cancel, or request redemption command with idempotency key.
    persistence: idempotency_records table.
    retention: Retained for replay and audit evidence until the owner-defined retention period expires.
    authentication: database credential or AWS task role plus Secrets Manager provided DATABASE_URL.
    authorization: database grants and service role access to the application database.
    encryption_in_transit: Postgres connection transport protection is expected in managed deployments.
    encryption_at_rest: Local Postgres volume in dev; AWS sandbox RDS is KMS encrypted.
    integrity_controls:
      - CTL-PI-001 compares request_hash for matching key reuse.
      - Primary key prevents duplicate scope/key_hash records.
    replay_or_deduplication_controls:
      - existing_idempotent_resource rejects mismatched request_hash.
    logging_and_audit_evidence:
      - idempotency scope
      - resource_id
      - API error code idempotency_conflict
    monitoring_or_alerting:
      - persistence tests and certifier duplicate-idempotency checks.
    failure_mode: Mismatched request hash returns an idempotency conflict.
    recovery_or_compensation: Retry same request body with same key or use a new key after resolving operator intent.
    related_controls:
      - CTL-PI-001
      - CTL-CONF-001
      - CTL-AUDIT-001
    related_diagrams:
      - dfd-01-logical-runtime.md
      - dfd-03-sweep-order-flow.md
      - dfd-04-redemption-flow.md
    source_files:
      - crates/persistence/src/idempotency.rs
      - crates/persistence/src/repositories.rs
      - crates/persistence/migrations/20260616150400_initial.sql
      - services/certifier/src/main.rs
  - id: DF-004
    name: API writes sweep order
    description: The create-order path inserts a Created sweep order in Postgres.
    source: P-001 API Service
    destination: DS-001 Postgres Financial Store
    trust_boundaries_crossed:
      - TB-003
      - TB-005
    protocol_or_mechanism: SQLx transaction insert into sweep_orders
    data_elements:
      - order_id
      - account_id
      - idempotency_key_hash
      - correlation_id
      - status
      - amount
      - cash_asset
      - product_asset
    data_classification: restricted_financial_record
    purpose: Persist the authoritative sweep order record.
    trigger: Accepted create sweep order request.
    persistence: sweep_orders table.
    retention: Retained as financial workflow evidence.
    authentication: database credential or AWS task role plus Secrets Manager provided DATABASE_URL.
    authorization: application database write permission.
    encryption_in_transit: Postgres connection transport protection is expected in managed deployments.
    encryption_at_rest: Local Postgres volume in dev; AWS sandbox RDS is KMS encrypted.
    integrity_controls:
      - SQL constraints validate status, positive amount, supported cash asset, and uniqueness.
      - CTL-PI-002 requires future status changes to use domain transitions.
    replay_or_deduplication_controls:
      - unique account_id and idempotency_key_hash pair.
    logging_and_audit_evidence:
      - correlation_id
      - state transition to Created
      - audit event for sweep.order.created.v1
    monitoring_or_alerting:
      - smoke polling of order status.
    failure_mode: Constraint violation or persistence failure rejects the write.
    recovery_or_compensation: Correct invalid input or retry idempotently.
    related_controls:
      - CTL-PI-002
      - CTL-CONF-001
      - CTL-AUDIT-001
    related_diagrams:
      - dfd-01-logical-runtime.md
      - dfd-03-sweep-order-flow.md
    source_files:
      - crates/persistence/src/repositories.rs
      - crates/persistence/migrations/20260616150400_initial.sql
      - spec/domain/sweep_order.machine.yaml
  - id: DF-005
    name: API writes outbox event
    description: The same transaction inserts the domain event into outbox_events and audit_events.
    source: P-001 API Service
    destination: DS-001 Postgres Financial Store
    trust_boundaries_crossed:
      - TB-003
      - TB-005
    protocol_or_mechanism: SQLx transaction insert into outbox_events and audit_events
    data_elements:
      - event_id
      - event_type
      - aggregate_id
      - correlation_id
      - causation_id
      - payload
    data_classification: restricted_financial_record
    purpose: Create durable asynchronous event and audit evidence.
    trigger: Domain event emitted by create order or command transition.
    persistence: outbox_events and audit_events tables.
    retention: Retained for event publication, replay analysis, and audit trail.
    authentication: database credential or AWS task role plus Secrets Manager provided DATABASE_URL.
    authorization: application database write permission.
    encryption_in_transit: Postgres connection transport protection is expected in managed deployments.
    encryption_at_rest: Local Postgres volume in dev; AWS sandbox RDS is KMS encrypted.
    integrity_controls:
      - EventEnvelope carries event_id, event_type, aggregate_id, and correlation_id.
      - Outbox status tracks pending, leased, published, and failed states.
    replay_or_deduplication_controls:
      - event_id primary key and outbox retry state.
    logging_and_audit_evidence:
      - outbox_events rows
      - audit_events rows
      - state_transitions emitted_events field
    monitoring_or_alerting:
      - certifier stale outbox check.
    failure_mode: Failed insert aborts the transaction and prevents partial workflow state.
    recovery_or_compensation: Retry the command after persistence error is resolved.
    related_controls:
      - CTL-CONF-001
      - CTL-AUDIT-001
    related_diagrams:
      - dfd-01-logical-runtime.md
      - dfd-03-sweep-order-flow.md
      - dfd-04-redemption-flow.md
    source_files:
      - crates/persistence/src/repositories.rs
      - crates/persistence/src/outbox.rs
      - crates/domain/src/events.rs
      - spec/asyncapi.yaml
  - id: DF-006
    name: Outbox publisher leases pending event
    description: The outbox publisher leases pending or failed outbox rows with skip-locked semantics.
    source: P-002 Outbox Publisher Worker
    destination: DS-001 Postgres Financial Store
    trust_boundaries_crossed:
      - TB-003
      - TB-005
    protocol_or_mechanism: SQLx lease query with for update skip locked
    data_elements:
      - event_id
      - event_type
      - payload
      - attempts
      - leased_until
      - status
    data_classification: restricted_financial_record
    purpose: Safely claim unpublished events for publication.
    trigger: Outbox publisher loop.
    persistence: Updates outbox_events status, attempts, and lease fields.
    retention: Outbox row remains for publication evidence and stale-event checks.
    authentication: database credential or AWS task role plus Secrets Manager provided DATABASE_URL.
    authorization: worker database update permission.
    encryption_in_transit: Postgres connection transport protection is expected in managed deployments.
    encryption_at_rest: Local Postgres volume in dev; AWS sandbox RDS is KMS encrypted.
    integrity_controls:
      - CTL-AVAIL-001 uses lease and retry state to avoid concurrent duplicate publication attempts.
    replay_or_deduplication_controls:
      - failed events become leasable again; published events are not selected.
    logging_and_audit_evidence:
      - attempts
      - leased_until
      - published_at or last_error
    monitoring_or_alerting:
      - certifier stale unpublished event check.
    failure_mode: Lease query failure logs an outbox lease error.
    recovery_or_compensation: Publisher loop retries on the next interval.
    related_controls:
      - CTL-AVAIL-001
    related_diagrams:
      - dfd-01-logical-runtime.md
      - dfd-03-sweep-order-flow.md
    source_files:
      - services/worker/src/workers/mod.rs
      - crates/persistence/src/outbox.rs
      - crates/persistence/tests/repository_tests.rs
  - id: DF-007
    name: Outbox publisher publishes to SNS
    description: The outbox publisher sends the event envelope to the configured SNS domain-events topic.
    source: P-002 Outbox Publisher Worker
    destination: MQ-001 SNS Domain Events Topic
    trust_boundaries_crossed:
      - TB-004
    protocol_or_mechanism: AWS SDK SNS Publish or LocalStack SNS publish
    data_elements:
      - event_id
      - event_type
      - aggregate_id
      - correlation_id
      - payload
    data_classification: restricted_financial_record
    purpose: Fan out domain events to worker queues.
    trigger: Leased outbox event.
    persistence: SNS message is transient; publication status is persisted in outbox_events.
    retention: SNS does not provide durable retention; SQS queues retain delivered messages.
    authentication: LocalStack dummy credentials in local mode; AWS sandbox task role in cert mode.
    authorization: SNS publish permission scoped to the domain-events topic in AWS sandbox mode.
    encryption_in_transit: AWS SDK HTTPS in AWS sandbox; LocalStack local HTTP in dev.
    encryption_at_rest: AWS sandbox SNS topic is KMS encrypted; LocalStack storage is local simulation state.
    integrity_controls:
      - Message body is serialized EventEnvelope.
      - Published events are marked in Postgres after publish success.
    replay_or_deduplication_controls:
      - Outbox event status and event_id identity.
    logging_and_audit_evidence:
      - event_id
      - SNS message_id
      - outbox published_at
    monitoring_or_alerting:
      - CloudWatch SNS metrics in AWS sandbox; LocalStack smoke output locally.
    failure_mode: Publish failure marks outbox row failed for retry.
    recovery_or_compensation: Outbox publisher leases failed row on a later loop.
    related_controls:
      - CTL-SEC-002
      - CTL-AVAIL-001
    related_diagrams:
      - dfd-01-logical-runtime.md
      - dfd-02-aws-certification-sandbox.md
      - dfd-03-sweep-order-flow.md
    source_files:
      - services/worker/src/workers/mod.rs
      - crates/messaging/src/sns.rs
      - crates/persistence/src/outbox.rs
      - infra/aws-simulation/main.tf
  - id: DF-008
    name: SNS fans out to SQS worker queues
    description: SNS delivers raw domain event messages to each worker SQS queue.
    source: MQ-001 SNS Domain Events Topic
    destination: MQ-002 SQS Worker Queues
    trust_boundaries_crossed:
      - TB-004
    protocol_or_mechanism: SNS to SQS subscription with raw message delivery
    data_elements:
      - event envelope JSON
      - event_id
      - event_type
      - aggregate_id
      - correlation_id
    data_classification: restricted_financial_record
    purpose: Deliver each domain event to transfer-agent, reconciliation, chain-watcher, and notification workers.
    trigger: SNS receives a published EventEnvelope.
    persistence: SQS source queues retain messages until workers delete them.
    retention: LocalStack simulated queue retention; AWS sandbox SQS source queue retention is configured in Terraform.
    authentication: AWS service principal delivers to SQS; LocalStack simulates service delivery locally.
    authorization: Queue policy permits SNS source topic to send messages.
    encryption_in_transit: AWS service transport in sandbox; LocalStack local HTTP in dev.
    encryption_at_rest: AWS sandbox SQS queues and DLQs are KMS encrypted.
    integrity_controls:
      - Raw message delivery preserves the EventEnvelope body expected by workers.
    replay_or_deduplication_controls:
      - At-least-once delivery is handled by inbox dedupe in DF-010.
    logging_and_audit_evidence:
      - queue attributes
      - subscription configuration
      - worker message_id
    monitoring_or_alerting:
      - CloudWatch DLQ alarms and queue drain scripts.
    failure_mode: Delivery failure or poison messages can leave source or DLQ backlog.
    recovery_or_compensation: Queue drain gates and DLQ review identify failed delivery.
    related_controls:
      - CTL-SEC-002
      - CTL-AVAIL-001
    related_diagrams:
      - dfd-01-logical-runtime.md
      - dfd-02-aws-certification-sandbox.md
      - dfd-03-sweep-order-flow.md
    source_files:
      - infra/aws-simulation/main.tf
      - scripts/localstack-init.sh
      - spec/asyncapi.yaml
      - scripts/aws-cert-wait-queues-drained.sh
  - id: DF-009
    name: Worker receives SQS message
    description: Worker services receive and parse SQS messages as EventEnvelope payloads.
    source: MQ-002 SQS Worker Queues
    destination: P-003 Worker Services
    trust_boundaries_crossed:
      - TB-003
      - TB-004
    protocol_or_mechanism: AWS SDK SQS ReceiveMessage and DeleteMessage or LocalStack equivalent
    data_elements:
      - message_id
      - receipt_handle
      - event envelope body
      - worker kind
    data_classification: restricted_financial_record
    purpose: Consume domain events for asynchronous workflow progression.
    trigger: Worker receive loop polls queue.
    persistence: Message remains in SQS until deleted; invalid-body poison messages are deleted by worker policy.
    retention: SQS queue retention or LocalStack simulated retention.
    authentication: LocalStack dummy credentials in local mode; AWS sandbox task role in cert mode.
    authorization: SQS receive, delete, get-attributes, and get-queue-url permissions for worker queues.
    encryption_in_transit: AWS SDK HTTPS in AWS sandbox; LocalStack local HTTP in dev.
    encryption_at_rest: AWS sandbox SQS queues are KMS encrypted.
    integrity_controls:
      - Worker deserializes EventEnvelope before handling.
      - Handler and inbox errors are retried; invalid body is treated as deleteable poison message.
    replay_or_deduplication_controls:
      - Inbox dedupe records in DF-010.
    logging_and_audit_evidence:
      - consumer_name
      - message_id
      - event_id
      - event_type
      - handler error logs
    monitoring_or_alerting:
      - queue drain reports and DLQ alarms.
    failure_mode: Handler or inbox recording failure leaves message for retry.
    recovery_or_compensation: SQS redelivery and DLQ review after max receives.
    related_controls:
      - CTL-AVAIL-001
    related_diagrams:
      - dfd-01-logical-runtime.md
      - dfd-03-sweep-order-flow.md
      - dfd-04-redemption-flow.md
    source_files:
      - services/worker/src/workers/mod.rs
      - crates/messaging/src/sqs.rs
      - infra/aws-simulation/main.tf
  - id: DF-010
    name: Worker applies inbox deduplication
    description: Worker services record the SQS message_id and event_id before applying handler side effects.
    source: P-003 Worker Services
    destination: DS-001 Postgres Financial Store
    trust_boundaries_crossed:
      - TB-003
      - TB-005
    protocol_or_mechanism: SQLx insert into inbox_messages
    data_elements:
      - consumer
      - message_id
      - event_id
      - processed_at
    data_classification: restricted_financial_record
    purpose: Prevent duplicate worker side effects from at-least-once queue delivery.
    trigger: Worker receives a valid EventEnvelope.
    persistence: inbox_messages table primary key on consumer and message_id.
    retention: Retained as worker processing evidence.
    authentication: database credential or AWS task role plus Secrets Manager provided DATABASE_URL.
    authorization: worker database insert permission.
    encryption_in_transit: Postgres connection transport protection is expected in managed deployments.
    encryption_at_rest: Local Postgres volume in dev; AWS sandbox RDS is KMS encrypted.
    integrity_controls:
      - Primary key prevents duplicate message processing for each consumer.
    replay_or_deduplication_controls:
      - Duplicate insert returns rows_affected zero and skips handler side effects.
    logging_and_audit_evidence:
      - consumer
      - message_id
      - event_id
      - inbox_deduplicates_worker_effects certifier check
    monitoring_or_alerting:
      - certifier DB invariant report.
    failure_mode: Inbox write failure causes message retry.
    recovery_or_compensation: SQS redelivers message after visibility timeout.
    related_controls:
      - CTL-AVAIL-001
    related_diagrams:
      - dfd-01-logical-runtime.md
      - dfd-03-sweep-order-flow.md
      - dfd-04-redemption-flow.md
    source_files:
      - crates/persistence/src/inbox.rs
      - services/worker/src/workers/mod.rs
      - services/certifier/src/main.rs
  - id: DF-011
    name: Transfer-agent worker calls mock transfer agent
    description: The transfer-agent worker posts a subscription request to the deterministic mock transfer-agent service.
    source: P-003 Worker Services
    destination: EXT-002 Mock Transfer Agent
    trust_boundaries_crossed:
      - TB-003
      - TB-009
    protocol_or_mechanism: HTTP POST /subscriptions in local or sandbox simulation
    data_elements:
      - order_id
      - idempotency_key
      - amount
      - product_asset
    data_classification: restricted_financial_record
    purpose: Simulate transfer-agent subscription confirmation.
    trigger: Transfer-agent worker sees order status SubscriptionSubmitted.
    persistence: Mock service keeps in-memory confirmation by idempotency key; confirmation is persisted downstream in Postgres.
    retention: In-memory mock retention lasts for service lifetime only.
    authentication: local_service_call in current simulation; future transfer-agent identity required for real integration.
    authorization: mock integration accepts local worker requests; future custodian authorization is out of scope.
    encryption_in_transit: Local HTTP inside demo network; TLS required for any real external integration.
    encryption_at_rest: Not persisted at this hop except mock in-memory state.
    integrity_controls:
      - Mock returns the same confirmation for repeated idempotency key.
      - Worker applies domain ConfirmTransferAgent command after success.
    replay_or_deduplication_controls:
      - subscription order_id idempotency key.
    logging_and_audit_evidence:
      - order_id
      - confirmation_ref
      - worker event_id logs
    monitoring_or_alerting:
      - worker logs and smoke status progression.
    failure_mode: HTTP or status error returns handler failure and message retry.
    recovery_or_compensation: SQS retry runs handler again; mock idempotency returns stable confirmation.
    related_controls:
      - CTL-SEC-001
      - CTL-PI-002
    related_diagrams:
      - dfd-03-sweep-order-flow.md
    source_files:
      - services/worker/src/workers/mod.rs
      - services/mock-transfer-agent/src/main.rs
      - docs/runbooks/aws-simulation.md
  - id: DF-012
    name: Transfer-agent confirmation writes position
    description: After transfer-agent confirmation, worker commands record transfer confirmation and book a position.
    source: P-003 Worker Services
    destination: DS-001 Postgres Financial Store
    trust_boundaries_crossed:
      - TB-003
      - TB-005
      - TB-009
    protocol_or_mechanism: Domain command handler and SQLx transaction
    data_elements:
      - order_id
      - confirmation_ref
      - account_id
      - product_asset
      - quantity
      - state transition
      - position_id
    data_classification: restricted_financial_record
    purpose: Establish that a confirmed subscription produced exactly one booked position.
    trigger: Mock transfer-agent returns confirmation_ref.
    persistence: sweep_orders, state_transitions, positions, ledger_entries, outbox_events, and audit_events.
    retention: Retained as financial record and audit evidence.
    authentication: database credential or AWS task role plus Secrets Manager provided DATABASE_URL.
    authorization: worker database write permission and domain command authorization assumptions.
    encryption_in_transit: Postgres connection transport protection is expected in managed deployments.
    encryption_at_rest: Local Postgres volume in dev; AWS sandbox RDS is KMS encrypted.
    integrity_controls:
      - PositionBooked requires transfer-agent confirmation.
      - positions unique order_id and unique transfer_agent_confirmation_ref.
      - balanced ledger entries for position booking.
    replay_or_deduplication_controls:
      - Inbox dedupe prevents duplicate handler effects.
      - Position insert uses on conflict order_id do nothing.
    logging_and_audit_evidence:
      - state_transitions entries
      - audit_events entries
      - certifier one_position_per_order check
      - no_duplicate_transfer_agent_confirmations check
    monitoring_or_alerting:
      - smoke verifies exactly one position for the order.
    failure_mode: Missing confirmation or database constraint failure prevents position booking.
    recovery_or_compensation: Queue retry after transient failure; reconciliation break path for mismatch conditions.
    related_controls:
      - CTL-PI-002
      - CTL-PI-003
      - CTL-CONF-001
      - CTL-AUDIT-001
    related_diagrams:
      - dfd-01-logical-runtime.md
      - dfd-03-sweep-order-flow.md
    source_files:
      - services/worker/src/workers/mod.rs
      - crates/persistence/src/repositories.rs
      - crates/persistence/migrations/20260616150400_initial.sql
      - crates/domain/src/sweep.rs
      - services/certifier/src/main.rs
  - id: DF-013
    name: Reconciliation worker validates reconciled history
    description: The reconciliation worker consumes position-booked events, reconciles the order, and activates it when no mismatch is injected.
    source: P-003 Worker Services
    destination: DS-001 Postgres Financial Store
    trust_boundaries_crossed:
      - TB-003
      - TB-005
    protocol_or_mechanism: Domain command handler and SQLx transaction
    data_elements:
      - order_id
      - event_id
      - correlation_id
      - status
      - reconciliation result
    data_classification: restricted_financial_record
    purpose: Ensure Active status follows Reconciled history or open an exception path.
    trigger: sweep.position.booked.v1 event.
    persistence: sweep_orders, state_transitions, outbox_events, audit_events, and optional reconciliation_breaks.
    retention: Retained as workflow and exception evidence.
    authentication: database credential or AWS task role plus Secrets Manager provided DATABASE_URL.
