asyncapi: 2.6.0
info:
  title: Institutional Yield Control Plane Events
  version: 1.0.0
  description: Local SNS/SQS event contract for sweep lifecycle and reconciliation workflows.
servers:
  localstack:
    url: http://localhost:4566
    protocol: sns+sqs
channels:
  sweep.order.created.v1:
    subscribe:
      message:
        $ref: "#/components/messages/SweepOrderCreated"
  sweep.eligibility.checked.v1:
    subscribe:
      message:
        $ref: "#/components/messages/GenericLifecycleEvent"
  sweep.disclosures.checked.v1:
    subscribe:
      message:
        $ref: "#/components/messages/GenericLifecycleEvent"
  sweep.order.approved.v1:
    subscribe:
      message:
        $ref: "#/components/messages/GenericLifecycleEvent"
  sweep.cash.locked.v1:
    subscribe:
      message:
        $ref: "#/components/messages/SweepCashLocked"
  sweep.subscription.submitted.v1:
    subscribe:
      message:
        $ref: "#/components/messages/GenericLifecycleEvent"
  sweep.transfer_agent.confirmed.v1:
    subscribe:
      message:
        $ref: "#/components/messages/TransferAgentConfirmed"
  sweep.chain_mirror.observed.v1:
    subscribe:
      message:
        $ref: "#/components/messages/GenericLifecycleEvent"
  sweep.position.booked.v1:
    subscribe:
      message:
        $ref: "#/components/messages/PositionBooked"
  sweep.reconciled.v1:
    subscribe:
      message:
        $ref: "#/components/messages/GenericLifecycleEvent"
  sweep.active.v1:
    subscribe:
      message:
        $ref: "#/components/messages/GenericLifecycleEvent"
  redemption.requested.v1:
    subscribe:
      message:
        $ref: "#/components/messages/GenericLifecycleEvent"
  redemption.submitted.v1:
    subscribe:
      message:
        $ref: "#/components/messages/GenericLifecycleEvent"
  redemption.confirmed.v1:
    subscribe:
      message:
        $ref: "#/components/messages/GenericLifecycleEvent"
  redemption.cash_credited.v1:
    subscribe:
      message:
        $ref: "#/components/messages/GenericLifecycleEvent"
  reconciliation.break.opened.v1:
    subscribe:
      message:
        $ref: "#/components/messages/ReconciliationBreakOpened"
  reconciliation.break.resolved.v1:
    subscribe:
      message:
        $ref: "#/components/messages/GenericLifecycleEvent"
  audit.event.recorded.v1:
    subscribe:
      message:
        $ref: "#/components/messages/GenericLifecycleEvent"
components:
  messages:
    GenericLifecycleEvent:
      payload:
        $ref: "schemas/events/event-envelope.schema.json"
    SweepOrderCreated:
      payload:
        $ref: "schemas/events/sweep-order-created.v1.schema.json"
    SweepCashLocked:
      payload:
        $ref: "schemas/events/sweep-cash-locked.v1.schema.json"
    TransferAgentConfirmed:
      payload:
        $ref: "schemas/events/transfer-agent-confirmed.v1.schema.json"
    PositionBooked:
      payload:
        $ref: "schemas/events/position-booked.v1.schema.json"
    ReconciliationBreakOpened:
      payload:
        $ref: "schemas/events/reconciliation-break-opened.v1.schema.json"
