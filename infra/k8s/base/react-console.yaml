apiVersion: v1
kind: Service
metadata:
  name: react-console
  labels:
    app.kubernetes.io/component: react-console
spec:
  ports:
    - name: http
      port: 5173
      targetPort: http
  selector:
    app.kubernetes.io/component: react-console
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-console
  labels:
    app.kubernetes.io/component: react-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: react-console
  template:
    metadata:
      labels:
        app.kubernetes.io/component: react-console
    spec:
      containers:
        - name: react-console
          image: yield-control-plane-react-console:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5173
          envFrom:
            - configMapRef:
                name: app-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

