apiVersion: v1
kind: Service
metadata:
  name: mock-transfer-agent
  labels:
    app.kubernetes.io/component: mock-transfer-agent
spec:
  ports:
    - name: http
      port: 8090
      targetPort: http
  selector:
    app.kubernetes.io/component: mock-transfer-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-transfer-agent
  labels:
    app.kubernetes.io/component: mock-transfer-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: mock-transfer-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mock-transfer-agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: mock-transfer-agent
          image: yield-control-plane-mock-transfer-agent:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          envFrom:
            - configMapRef:
                name: app-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

