apiVersion: v1
kind: Service
metadata:
  name: localstack
  labels:
    app.kubernetes.io/component: localstack
spec:
  ports:
    - name: edge
      port: 4566
      targetPort: edge
  selector:
    app.kubernetes.io/component: localstack
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  labels:
    app.kubernetes.io/component: localstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: localstack
  template:
    metadata:
      labels:
        app.kubernetes.io/component: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:4
          imagePullPolicy: IfNotPresent
          ports:
            - name: edge
              containerPort: 4566
          env:
            - name: SERVICES
              value: sns,sqs
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: local-dev-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: local-dev-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AWS_DEFAULT_REGION
            - name: DEBUG
              value: "0"
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: edge
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_localstack/health
              port: edge
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: localstack-data
              mountPath: /var/lib/localstack
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: localstack-data
          emptyDir: {}

